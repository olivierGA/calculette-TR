<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculette de prix de vente</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-soft: #F4F2EE;
    --ink: #1A1A1A;
    --muted: #6B6B6B;
    --line: rgba(0, 0, 0, 0.08);
    --line-strong: rgba(0, 0, 0, 0.15);
    --info-bg: #E6F1FB;
    --info-text: #0C447C;
    --info-text-strong: #042C53;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  .wrap {
    max-width: 420px;
    margin: 0 auto;
  }

  .position-card {
    background: var(--surface-soft);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 16px;
  }

  .calc-card {
    background: var(--surface);
    border: 0.5px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title i {
    font-size: 18px;
  }

  .position-label {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 10px;
    font-weight: 500;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .field input {
    width: 100%;
    height: 36px;
    padding: 0 12px;
    border: 0.5px solid var(--line-strong);
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
    background: var(--surface);
    transition: border-color 0.15s ease;
  }

  .field input:hover {
    border-color: rgba(0, 0, 0, 0.25);
  }

  .field input:focus {
    outline: none;
    border-color: rgba(0, 0, 0, 0.4);
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
  }

  .meta {
    font-size: 12px;
    color: var(--muted);
    margin: 10px 0 0;
  }

  .meta strong {
    color: var(--ink);
    font-weight: 500;
  }

  .result {
    background: var(--info-bg);
    border-radius: var(--radius-md);
    padding: 12px;
    margin-top: 14px;
  }

  .result-label {
    font-size: 12px;
    color: var(--info-text);
    margin: 0 0 4px;
  }

  .result-value {
    font-size: 24px;
    font-weight: 500;
    color: var(--info-text-strong);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .result-detail {
    font-size: 12px;
    color: var(--info-text);
    margin: 6px 0 0;
  }
</style>
</head>
<body>
  <div class="wrap">

    <div class="position-card">
      <p class="position-label">Ta position</p>
      <div class="field-grid">
        <div class="field">
          <label for="pru">PRU (€)</label>
          <input type="number" id="pru" value="0" step="0.01">
        </div>
        <div class="field">
          <label for="shares">Nb d'actions</label>
          <input type="number" id="shares" step="0.00001" placeholder="ex. 0,02545">
        </div>
      </div>
      <p class="meta">Investi : <strong id="invested">—</strong></p>
    </div>

    <div class="calc-card">
      <p class="card-title"><i class="ti ti-coin-euro" aria-hidden="true"></i>Plus-value en euros</p>
      <div class="field-grid">
        <div class="field">
          <label for="fees1">Frais (€)</label>
          <input type="number" id="fees1" value="1" step="0.1" min="0">
        </div>
        <div class="field">
          <label for="gain-eur">Plus-value (€)</label>
          <input type="number" id="gain-eur" value="0" step="0.1" min="0">
        </div>
      </div>
      <div class="result">
        <p class="result-label">Prix de vente cible</p>
        <p class="result-value" id="result-eur">—</p>
        <p class="result-detail" id="detail-eur">—</p>
      </div>
    </div>

    <div class="calc-card">
      <p class="card-title"><i class="ti ti-percentage" aria-hidden="true"></i>Plus-value en pourcentage</p>
      <div class="field-grid">
        <div class="field">
          <label for="fees2">Frais (€)</label>
          <input type="number" id="fees2" value="1" step="0.1" min="0">
        </div>
        <div class="field">
          <label for="gain-pct">Plus-value (%)</label>
          <input type="number" id="gain-pct" value="20" step="0.5" min="0">
        </div>
      </div>
      <div class="result">
        <p class="result-label">Prix de vente cible</p>
        <p class="result-value" id="result-pct">—</p>
        <p class="result-detail" id="detail-pct">—</p>
      </div>
    </div>

  </div>

<script>
(function(){
  const fmtEur = (n) => n.toLocaleString('fr-FR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' €';

  const pru = document.getElementById('pru');
  const shares = document.getElementById('shares');
  const fees1 = document.getElementById('fees1');
  const gainEur = document.getElementById('gain-eur');
  const fees2 = document.getElementById('fees2');
  const gainPct = document.getElementById('gain-pct');

  function compute() {
    const p = parseFloat(pru.value) || 0;
    const s = parseFloat(shares.value) || 0;
    const invested = p * s;
    document.getElementById('invested').textContent = fmtEur(invested);

    if (s > 0) {
      const f1 = parseFloat(fees1.value) || 0;
      const ge = parseFloat(gainEur.value) || 0;
      const target1 = (invested + f1 + ge) / s;
      document.getElementById('result-eur').textContent = fmtEur(target1);
      const brut1 = target1 * s;
      document.getElementById('detail-eur').textContent =
        'Vente brute : ' + fmtEur(brut1) + ' · Net : ' + fmtEur(brut1 - f1);

      const f2 = parseFloat(fees2.value) || 0;
      const gp = parseFloat(gainPct.value) || 0;
      const gainEurFromPct = invested * gp / 100;
      const target2 = (invested + f2 + gainEurFromPct) / s;
      document.getElementById('result-pct').textContent = fmtEur(target2);
      document.getElementById('detail-pct').textContent =
        'Soit ' + fmtEur(gainEurFromPct) + ' de plus-value nette';
    }
  }

  [pru, shares, fees1, gainEur, fees2, gainPct].forEach(el => {
    el.addEventListener('input', compute);
  });
  compute();
})();
</script>
</body>
</html>
